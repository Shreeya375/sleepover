<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dream Fragments</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- START SCREEN -->
  <div id="start-screen">
    <h1>☾ Dream Fragments ☾</h1>
    <p class="story">
      During the sleepover, you drifted off…  
      but something followed you into your dream.  
      Collect the glowing fragments before the nightmare finds you.
    </p>
    <p class="press-space">Press SPACE to begin</p>
  </div>

  <!-- GAME AREA -->
  <div id="game" style="display:none;">
    <div id="player"></div>
    <div id="score">Fragments: 0</div>
    <div id="timer">Time: 20</div>
  </div>

  <!-- END SCREEN -->
  <div id="end-screen" style="display:none;">
    <h1 id="end-title"></h1>
    <p id="end-message"></p>
    <button onclick="location.reload()">Play Again</button>
  </div>

<script src="script.js"></script>
</body>
</html>
